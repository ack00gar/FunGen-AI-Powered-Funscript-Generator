[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may use filesystem)
    functional: Functional tests (test complete features)
    e2e: End-to-end tests (full application flow)
    performance: Performance/benchmark tests
    gui: GUI-related tests (require display)
    cli: CLI mode tests
    plugins: Plugin system tests
    trackers: Tracker system tests
    slow: Slow tests (>10s)
addopts = -v --tb=short
