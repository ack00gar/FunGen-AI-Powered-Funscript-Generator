name: tests

on:
  push:
    branches: ['**']
  pull_request:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (${{ matrix.os }} / py${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ['3.11']
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    env:
      KMP_DUPLICATE_LIB_OK: "TRUE"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install test dependencies
        # Minimal set for the current test suite. No GUI libs (imgui, glfw,
        # pyopengl) and no heavyweight optional deps. Headless OpenCV only.
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install \
            pytest \
            numpy \
            opencv-python-headless \
            orjson \
            msgpack \
            scipy \
            simplification \
            ultralytics \
            torch \
            torchvision

      - name: Show environment
        run: |
          python --version
          python -c "import sys; print('sys.path:', sys.path)"
          python -c "import numpy, cv2, orjson, msgpack; print('numpy', numpy.__version__, 'cv2', cv2.__version__)"

      - name: Run pytest
        run: python -m pytest -v --tb=short --color=yes
